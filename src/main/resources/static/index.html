<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0"/>
  <title>SwiggyClone — Food Management</title>
  <link href="https://fonts.googleapis.com/css2?family=Syne:wght@400;600;700;800&family=DM+Sans:wght@300;400;500&display=swap" rel="stylesheet"/>
  <style>
    :root {
      --orange: #FF6B35;
      --orange-dark: #e85520;
      --yellow: #FFD166;
      --bg: #0d0d0d;
      --card: #161616;
      --border: #252525;
      --text: #f0f0f0;
      --muted: #888;
      --green: #06D6A0;
      --red: #EF233C;
    }
    * { margin:0; padding:0; box-sizing:border-box; }
    body {
      font-family: 'DM Sans', sans-serif;
      background: var(--bg);
      color: var(--text);
      min-height: 100vh;
      overflow-x: hidden;
    }

    /* HERO BACKGROUND */
    .hero-bg {
      position: fixed; inset: 0; z-index: 0;
      background: radial-gradient(ellipse 80% 60% at 60% 0%, rgba(255,107,53,0.18) 0%, transparent 60%),
                  radial-gradient(ellipse 50% 40% at 10% 90%, rgba(255,209,102,0.10) 0%, transparent 50%);
      pointer-events: none;
    }

    /* NAV */
    nav {
      position: fixed; top: 0; left: 0; right: 0; z-index: 100;
      display: flex; align-items: center; justify-content: space-between;
      padding: 1.2rem 3rem;
      background: rgba(13,13,13,0.85);
      backdrop-filter: blur(14px);
      border-bottom: 1px solid var(--border);
    }
    .nav-logo {
      font-family: 'Syne', sans-serif;
      font-size: 1.5rem; font-weight: 800;
      color: var(--orange);
      letter-spacing: -0.5px;
    }
    .nav-logo span { color: var(--text); }
    .nav-links { display: flex; gap: 1rem; }
    .nav-btn {
      padding: .5rem 1.4rem;
      border-radius: 100px;
      font-size: .9rem;
      font-family: 'DM Sans', sans-serif;
      cursor: pointer;
      transition: all .2s;
      text-decoration: none;
    }
    .nav-btn.ghost {
      border: 1px solid var(--border);
      background: transparent;
      color: var(--text);
    }
    .nav-btn.ghost:hover { border-color: var(--orange); color: var(--orange); }
    .nav-btn.filled {
      background: var(--orange);
      border: 1px solid var(--orange);
      color: white;
      font-weight: 500;
    }
    .nav-btn.filled:hover { background: var(--orange-dark); }

    /* MAIN LAYOUT */
    main {
      position: relative; z-index: 1;
      display: flex; align-items: center; justify-content: center;
      min-height: 100vh;
      padding: 6rem 2rem 3rem;
    }
    .auth-container {
      width: 100%; max-width: 440px;
    }

    /* LOGO BIG */
    .brand-big {
      text-align: center; margin-bottom: 2.5rem;
    }
    .brand-big .icon {
      font-size: 3rem; margin-bottom: .5rem;
    }
    .brand-big h1 {
      font-family: 'Syne', sans-serif;
      font-size: 2rem; font-weight: 800;
      color: var(--orange);
    }
    .brand-big p {
      font-size: .9rem; color: var(--muted); margin-top: .3rem;
    }

    /* CARD */
    .card {
      background: var(--card);
      border: 1px solid var(--border);
      border-radius: 20px;
      padding: 2.2rem;
      box-shadow: 0 20px 60px rgba(0,0,0,.5);
    }
    .tabs {
      display: flex; border-radius: 12px;
      background: var(--bg);
      padding: 4px; gap: 4px; margin-bottom: 1.8rem;
    }
    .tab {
      flex: 1; text-align: center;
      padding: .6rem;
      border-radius: 9px;
      cursor: pointer;
      font-size: .88rem; font-weight: 500;
      color: var(--muted);
      transition: all .2s;
    }
    .tab.active {
      background: var(--orange);
      color: white;
    }

    label {
      display: block; font-size: .82rem;
      color: var(--muted); margin-bottom: .4rem; font-weight: 500;
    }
    input, select {
      width: 100%;
      padding: .75rem 1rem;
      border-radius: 10px;
      border: 1px solid var(--border);
      background: var(--bg);
      color: var(--text);
      font-size: .92rem;
      font-family: 'DM Sans', sans-serif;
      margin-bottom: 1rem;
      outline: none;
      transition: border .2s;
    }
    input:focus, select:focus { border-color: var(--orange); }
    select option { background: #1a1a1a; }

    .btn-primary {
      width: 100%;
      padding: .85rem;
      border-radius: 12px;
      background: var(--orange);
      color: white; border: none;
      font-size: 1rem; font-weight: 600;
      font-family: 'Syne', sans-serif;
      cursor: pointer;
      transition: all .2s;
      letter-spacing: .3px;
    }
    .btn-primary:hover { background: var(--orange-dark); transform: translateY(-1px); }
    .btn-primary:active { transform: translateY(0); }

    .msg {
      margin-top: .8rem;
      font-size: .83rem;
      text-align: center;
      padding: .6rem;
      border-radius: 8px;
    }
    .msg.success { background: rgba(6,214,160,.12); color: var(--green); border: 1px solid rgba(6,214,160,.3); }
    .msg.error { background: rgba(239,35,60,.12); color: var(--red); border: 1px solid rgba(239,35,60,.3); }
    .hidden { display: none !important; }

    /* ROLE CARDS */
    .role-section {
      margin-top: 2rem; text-align: center;
    }
    .role-section p { font-size: .82rem; color: var(--muted); margin-bottom: 1rem; }
    .role-cards {
      display: flex; gap: .8rem;
    }
    .role-card {
      flex: 1; padding: 1rem .6rem;
      background: var(--bg);
      border: 1px solid var(--border);
      border-radius: 12px;
      text-align: center;
      cursor: pointer;
      transition: all .2s;
      text-decoration: none; color: var(--text);
      display: block;
    }
    .role-card:hover { border-color: var(--orange); transform: translateY(-2px); }
    .role-card .emoji { font-size: 1.6rem; display: block; margin-bottom: .4rem; }
    .role-card .name { font-size: .75rem; font-weight: 600; color: var(--muted); }

    /* FEATURES STRIP */
    .features {
      display: flex; justify-content: center; gap: 3rem;
      padding: 1.5rem 0 0;
      margin-top: 2rem;
    }
    .feat { text-align: center; }
    .feat .icon { font-size: 1.4rem; }
    .feat p { font-size: .75rem; color: var(--muted); margin-top: .3rem; }
  </style>
</head>
<body>
  <div class="hero-bg"></div>

  <nav>
    <div class="nav-logo">Swiggy<span> Clone</span></div>
    <div class="nav-links">
      <a href="/Customer" class="nav-btn ghost">Browse Food 🍔</a>
      <a href="/Admin" class="nav-btn filled">🛡️ Admin Panel</a>
    </div>
  </nav>

  <main>
    <div class="auth-container">
      <div class="brand-big">
        <div class="icon">🍔</div>
        <h1>Swiggy Clone</h1>
        <p>Food Management Platform — Order, Deliver, Manage</p>
      </div>

      <div class="card">
        <div class="tabs">
          <div class="tab active" onclick="switchTab('login')">Sign In</div>
          <div class="tab" onclick="switchTab('register')">Register</div>
        </div>

        <div id="login-form" autocomplete="off">
  
  <input type="text" name="prevent_autofill" id="prevent_autofill" value="" style="display:none;" />
  <input type="password" name="password_fake" id="password_fake" value="" style="display:none;" />

  <label>Email</label>
  <input type="email" id="login-email" placeholder="you@example.com" autocomplete="new-password"/>
  
  <label>Password</label>
  <input type="password" id="login-password" placeholder="••••••••" autocomplete="new-password"/>
  
  <button class="btn-primary" onclick="handleLogin()">Sign In →</button>
  <div id="login-msg" class="msg hidden"></div>
</div>

        <!-- REGISTER -->
        <div id="register-form" class="hidden">
          <label>Full Name</label>
          <input type="text" id="reg-name" placeholder="John Doe"/>
          <label>Email</label>
          <input type="email" id="reg-email" placeholder="you@example.com"/>
          <label>Password</label>
          <input type="password" id="reg-password" placeholder="Min 6 chars"/>
          <label>Role</label>
          <select id="reg-role">
  <option value="CUSTOMER">🛒 Customer</option>
  <option value="DELIVERY_PARTNER">🛵 Delivery Partner</option>
  <option value="ADMIN">🛡 Admin</option>
</select>
          <button class="btn-primary" onclick="handleRegister()">Create Account →</button>
          <div id="reg-msg" class="msg hidden"></div>
        </div>
      </div>

      <div class="role-section">
  <p>Jump to dashboard</p>
  <div class="role-cards">
    <div onclick="secureJump('/Customer')" class="role-card">
      <span class="emoji">🛒</span>
      <div class="name">Customer</div>
    </div>
    <div onclick="secureJump('/Admin')" class="role-card">
      <span class="emoji">🛡️</span>
      <div class="name">Admin</div>
    </div>
    <div onclick="secureJump('/Delivery')" class="role-card">
      <span class="emoji">🛵</span>
      <div class="name">Delivery</div>
    </div>
  </div>
</div>

      <div class="features">
        <div class="feat"><div class="icon">⚡</div><p>Fast Orders</p></div>
        <div class="feat"><div class="icon">📍</div><p>Live Tracking</p></div>
        <div class="feat"><div class="icon">🔒</div><p>Secure Auth</p></div>
      </div>
    </div>
  </main>

  <script>
    const BASE = 'http://localhost:8080';
    
    window.onload = () => {
        // Correct IDs match panna thaan clear aagum mapla
        const emailField = document.getElementById('login-email');
        const passwordField = document.getElementById('login-password');

        if(emailField) emailField.value = '';
        if(passwordField) passwordField.value = '';
    };

    function switchTab(tab) {
      document.querySelectorAll('.tab').forEach((t,i) => t.classList.toggle('active', (i===0&&tab==='login')||(i===1&&tab==='register')));
      document.getElementById('login-form').classList.toggle('hidden', tab!=='login');
      document.getElementById('register-form').classList.toggle('hidden', tab!=='register');
    }

    function showMsg(id, msg, type) {
      const el = document.getElementById(id);
      el.textContent = msg; el.className = `msg ${type}`;
      el.classList.remove('hidden');
      setTimeout(() => el.classList.add('hidden'), 4000);
    }

    async function handleRegister() {
    	  const name = document.getElementById('reg-name').value.trim();
    	  const email = document.getElementById('reg-email').value.trim();
    	  const password = document.getElementById('reg-password').value;
    	  const role = document.getElementById('reg-role').value; // Dropdown value edukkum

    	  if (!name || !email || !password) return showMsg('reg-msg','Fill all fields','error');

    	  try {
    	    // URL-ah direct-aa backend controller match aagura maari maathunadhaan work aagum
    	    const res = await fetch('http://localhost:8080/admin/user', {
    	      method: 'POST',
    	      headers: { 'Content-Type': 'application/json' },
    	      body: JSON.stringify({ name, email, password, role })
    	    });

    	    if (res.ok) {
    	      showMsg('reg-msg', '✅ Registered Successfully!', 'success');
    	      setTimeout(() => switchTab('login'), 1500);
    	    } else {
    	      // Inga error vandha backend console-ah paaru mapla
    	      showMsg('reg-msg', 'Registration failed. Check if email exists.', 'error');
    	    }
    	  } catch (e) {
    	    showMsg('reg-msg', 'Server unreachable. Is Spring Boot running?', 'error');
    	  }
    	}

    async function handleLogin() {
        const email = document.getElementById('login-email').value.trim();
        const password = document.getElementById('login-password').value;

        // 1. Mandatory field check
        if (!email || !password) {
            return showMsg('login-msg', 'Please enter both fields!', 'error');
        }

        // 2. Strict Admin-Only Validation
        if (email === "admin" && password === "admin") {
            showMsg('login-msg', '✅ Access Granted! Welcome Admin.', 'success');
            
            // Storage-la save panna pinnaadi access control-ku useful-aa irukkum
            localStorage.setItem('userRole', 'ADMIN');
            
            localStorage.setItem('isLoggedIn', 'true');
            
            // Redirect to Admin Dashboard
            setTimeout(() => { 
                window.location.href = '/Admin'; 
            }, 1000);
        } 
        else {
            // Thappa enter panna error message kaattum
            showMsg('login-msg', '❌ Unauthorized! Only Admins can enter.', 'error');
            
            // Input-ah clear panni reset panniduvom
            document.getElementById('login-email').value = "";
            document.getElementById('login-password').value = "";
        }
    }
    
    function jumpToDashboard() {
        if (localStorage.getItem('isLoggedIn') === 'true') {
            window.location.href = '/Admin';
        } else {
            showMsg('login-msg', '⚠️ Authentication Required: You need to sign in to access this page', 'error');
        }
    }
    
    function logout() {
        localStorage.removeItem('isLoggedIn'); // Token-ah azhichiduvom
        window.location.href = '/Home';
    }
    
    function secureJump(page) {
        if (localStorage.getItem('isLoggedIn') === 'true') {
            window.location.href = page;
        } else {
            // Index page-la login message kaattum
            showMsg('login-msg', '⚠️ Authentication Required: You need to sign in to access this page', 'error');
        }
    }
  </script>
</body>
</html>
